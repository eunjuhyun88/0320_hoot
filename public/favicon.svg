<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1A1714"/>
  <!-- Ear tufts -->
  <rect x="9" y="3" width="2" height="2" fill="#E8956E"/>
  <rect x="11" y="2" width="2" height="2" fill="#D97757"/>
  <rect x="19" y="2" width="2" height="2" fill="#D97757"/>
  <rect x="21" y="3" width="2" height="2" fill="#E8956E"/>
  <!-- Head -->
  <rect x="10" y="4" width="12" height="3" fill="#D97757"/>
  <rect x="9" y="5" width="14" height="2" fill="#D97757"/>
  <rect x="11" y="4" width="10" height="1" fill="#E8956E"/>
  <!-- Face disc -->
  <rect x="8" y="7" width="16" height="6" fill="#D97757"/>
  <rect x="9" y="8" width="6" height="4" fill="#FAF0EB"/>
  <rect x="17" y="8" width="6" height="4" fill="#FAF0EB"/>
  <!-- Eyes -->
  <rect x="11" y="9" width="2" height="2" fill="#1A1A1A"/>
  <rect x="19" y="9" width="2" height="2" fill="#1A1A1A"/>
  <rect x="11" y="9" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="9" width="1" height="1" fill="#FFFFFF"/>
  <!-- Beak -->
  <rect x="15" y="12" width="2" height="1" fill="#C8960F"/>
  <!-- Body -->
  <rect x="9" y="13" width="14" height="6" fill="#D97757"/>
  <rect x="8" y="14" width="2" height="4" fill="#B85A3E"/>
  <rect x="22" y="14" width="2" height="4" fill="#B85A3E"/>
  <!-- Belly -->
  <rect x="12" y="15" width="8" height="4" fill="#E8D5C4"/>
  <!-- Feet -->
  <rect x="11" y="19" width="3" height="2" fill="#C8960F"/>
  <rect x="18" y="19" width="3" height="2" fill="#C8960F"/>
</svg>
